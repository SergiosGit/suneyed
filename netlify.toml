# Netlify configuration for suneyed.com
# Deploy: connect the suneyed-website/ folder (or a separate GitHub repo) to Netlify

[build]
  publish = "."   # serve files from the root of this directory

# Clean URLs: /how-it-works → how-it-works.html
[[redirects]]
  from = "/how-it-works"
  to   = "/how-it-works.html"
  status = 200

[[redirects]]
  from = "/installers"
  to   = "/installers.html"
  status = 200

[[redirects]]
  from = "/support"
  to   = "/support.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to   = "/privacy.html"
  status = 200

# Installer form success redirect
[[redirects]]
  from = "/installer-form-success"
  to   = "/installers.html?success=true"
  status = 302

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), microphone=(), camera=()"
